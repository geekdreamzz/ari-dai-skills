name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    needs: []
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dai-skills
    permissions:
      id-token: write  # OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
